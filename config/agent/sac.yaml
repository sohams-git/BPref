#comment out the above for running wofost 




# keep your existing top-level experiment/segment/etc...

agent:
  name: sac
  class: agent.sac.SACAgent
  params:
    obs_dim: ???
    action_dim: ???
    action_range: ???
    device: ${device}
    critic_cfg:
      class: agent.critic.DoubleQCritic
      params:
        obs_dim: ${agent.params.obs_dim}
        action_dim: ${agent.params.action_dim}
        hidden_dim: 1024
        hidden_depth: 2
    actor_cfg:
      class: agent.actor.DiagGaussianActor
      params:
        obs_dim: ${agent.params.obs_dim}
        action_dim: ${agent.params.action_dim}
        hidden_depth: 2
        hidden_dim: 1024
        log_std_bounds: [-5, 2]
    discount: 0.99
    init_temperature: 0.1
    alpha_lr: 0.0001
    alpha_betas: [0.9, 0.999]
    actor_lr: 0.0001
    actor_betas: [0.9, 0.999]
    actor_update_frequency: 1
    critic_lr: 0.0001
    critic_betas: [0.9, 0.999]
    critic_tau: 0.005
    critic_target_update_frequency: 2
    batch_size: 1024
    learnable_temperature: true
    normalize_state_entropy: true