defaults:
    - agent: sac
    
# this needs to be specified manually
experiment: PEBBLE

# reward learning
segment: 50
activation: tanh
num_seed_steps: 1000
num_unsup_steps: 5000
num_interact: 5000
reward_lr: 0.0003
reward_batch: 128
reward_update: 200
feed_type: 0
reset_update: 100
topK: 5
ensemble_size: 3
max_feedback: 1400
large_batch: 10
label_margin: 0.0
teacher_beta: -1
teacher_gamma: 1
teacher_eps_mistake: 0
teacher_eps_skip: 0
teacher_eps_equal: 0

# scheduling
reward_schedule: 0

num_train_steps: 1e6
replay_buffer_capacity: ${num_train_steps}

# evaluation config
eval_frequency: 10000
num_eval_episodes: 10
device: cuda

# logger
log_frequency: 10000
log_save_tb: true

# video recorder
save_video: false

# setups
seed: 1

# Environment
env: dog_stand
gradient_update: 1

# hydra configuration

hydra:
  job:
    name: ${env}
  run:
    dir: ./exp/${env}/${experiment}_maxfeed${max_feedback}_seg${segment}_seed${seed}

# -------------------------
# WOFOST-only Tier-2 toggles
# -------------------------
wofost:
  enable_tier2: false          # flip to true only for WOFOST runs
  pref_mode: segments          # segments | full_episode
  segment_len_override: null   # e.g., 200 or 365; null = use segment above
  log_pref_hist: true          # log +1/0/-1 label counts per preference round
  bucket_labels: true
  bucket_quantiles: [0.33, 0.66]